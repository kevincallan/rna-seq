# =============================================================================
# RNA-seq Analysis Pipeline Configuration (exam runbook)
# =============================================================================
# This file is the single place to tune pipeline behavior.
# Keep this as your checklist on exam day:
#
# Step 00 (env):     usually no config change; verify tools and Python env.
# Step 01 (samples): update `data`, `column_mapping`, `subset_filters`, `active_subset`.
# Step 02 (trim):    update `trimming` (methods + quality/adapters).
# Step 03-04 (QC):   no major config knobs; outputs reflect step 02 choices.
# Step 05 (STAR):    update `references` + `star_params` if needed.
# Step 06 (BigWig):  update `bigwig` mapq/normalization.
# Step 07 (counts):  update `featurecounts` backend/strandedness/option_sets.
# Step 08 (filter):  update `filtering.min_max_count`.
# Step 09 (DE):      update `deseq2` + `comparisons`.
# Step 10-11 (report): no extra config needed; they summarize prior outputs.
# =============================================================================

# -- Project metadata ---------------------------------------------------------
project:
  name: "GSE48519_5mC_oxidation"   # short project identifier
  results_dir: "results"            # top-level results folder
  work_dir: "work"                  # intermediate files
  logs_dir: "logs"                  # per-run log directory
  threads: 4                        # default thread count for tools

# -- Input data ---------------------------------------------------------------
data:
  # Step 01 (prepare samples): set where inputs live.
  # For a new dataset, these are the first two fields to change.
  metadata_csv: "/data/GSE48519/metadata.csv"   # sample sheet
  fastq_dir: "/data/GSE48519"                   # raw FASTQ folder
  # Layout: "paired", "single", or "auto" (auto-detect from file presence)
  layout: "paired"

# -- Column mapping -----------------------------------------------------------
# Step 01: map metadata columns to pipeline concepts.
# If the metadata schema changes, this section must be updated.
column_mapping:
  run_id_col: "Run"                    # SRR/ERR/DRR accession column
  condition_cols:                      # one or more columns composing condition label
    - "Genotype"
  # Optional: map raw condition values to short safe names
  condition_map:
    "wild-type": "wt"
    "tet1-/-": "tet1"
    "tet2-/-": "tet2"
  # How replicates are numbered within each condition
  # "sorted_run_id" = sort Run IDs alphabetically, assign 1,2,3...
  replicate_strategy: "sorted_run_id"

# -- Subset filters -----------------------------------------------------------
# Step 01: select the cohort to analyze.
# Only rows matching ALL key/value pairs are kept.
# Use "" to match empty fields.
subset_filters:
  # Day 0 (undifferentiated)
  default:
    "Assay Type": "RNA-Seq"
    "differentiation": ""

  # Day 3 (early differentiation)
  day3:
    "Assay Type": "RNA-Seq"
    "differentiation": "day 3"

  # Day 6 (late differentiation)
  day6:
    "Assay Type": "RNA-Seq"
    "differentiation": "day 6"

# Which subset to use (key from subset_filters above)
# You can also override at runtime: --subset <name>
active_subset: "default"

# -- Reference genome ---------------------------------------------------------
references:
  genome_index: "/data/indices/mm39/star"
  gtf: "/data/genomes/mouse/GRCm39/Mus_musculus.GRCm39.115.chr_gene_names.gtf.gz"
  genome_fasta: "/data/genomes/mouse/GRCm39/Mus_musculus.GRCm39.dna.primary_assembly.fa.gz"

# -- Tool paths ---------------------------------------------------------------
# Leave as tool name to use $PATH, or give absolute path.
tools:
  fastqc: "fastqc"
  multiqc: "multiqc"
  cutadapt: "cutadapt"
  fastp: "fastp"
  trimmomatic: "trimmomatic"
  star: "STAR"
  samtools: "samtools"
  featurecounts: "featureCounts"
  bamcoverage: "bamCoverage"

# -- STAR mapping parameters --------------------------------------------------
star_params:
  # Step 05 (mapping) quality/sensitivity knobs:
  # - lower outFilterMultimapNmax => stricter unique mapping preference
  # - raise for repetitive genomes if too many unmapped reads
  outSAMtype: "BAM SortedByCoordinate"
  readFilesCommand: "zcat"
  outFilterMultimapNmax: 20
  extra_args: ""                    # any extra STAR flags

# -- Trimming methods ---------------------------------------------------------
# Step 02:
# - Enable >=2 methods (for example: none + cutadapt) to compare preprocessing.
# - "none" is a valid no-trim baseline control.
trimming:
  none:
    enabled: true
    # No parameters needed

  cutadapt:
    enabled: true
    adapter_fwd: "AGATCGGAAGAGCACACGTCTGAACTCCAGTCA"  # Illumina TruSeq R1
    adapter_rev: "AGATCGGAAGAGCGTCGTGTAGGGAAAGAGTGT"  # Illumina TruSeq R2
    quality: 20     # increase for stricter base quality trimming
    min_length: 25  # increase to discard shorter post-trim reads
    extra_args: ""

  fastp:
    enabled: false
    quality: 20
    min_length: 25
    detect_adapter: true       # let fastp auto-detect adapters
    extra_args: ""

  trimmomatic:
    enabled: false             # disabled by default; enable if available
    adapter_file: "TruSeq3-PE-2.fa"
    leading: 3
    trailing: 3
    slidingwindow: "4:20"
    min_length: 25
    extra_args: ""

# -- featureCounts options ----------------------------------------------------
# Step 07:
# backend:
#   - "featurecounts" = preferred server binary backend
#   - "htseq"         = Python fallback backend
#
# strandedness:
#   0 = unstranded, 1 = stranded, 2 = reverse-stranded
#   Wrong strandedness can severely reduce assigned reads.
featurecounts:
  backend: "featurecounts"   # "featurecounts" or "htseq"
  strandedness: 2            # 0=unstranded, 1=stranded, 2=reverse-stranded
  feature_type: "exon"
  attribute: "gene_id"
  option_sets:
    default:
      label: "Default"
      B: false                 # require both ends mapped
      P: false                 # count fragments instead of reads
      C: false                 # exclude chimeric fragments
      Q: 0                     # minimum MAPQ
      extra_args: ""
    strict:
      label: "Strict (B+P+C+Q10)"
      B: true
      P: true
      C: true
      Q: 10                    # moderate mapq filter
      extra_args: ""
    stringent:
      label: "Stringent (B+P+C+Q255)"
      B: true
      P: true
      C: true
      Q: 255                   # unique mappers only (STAR convention)
      extra_args: ""

# -- Matrix filtering ---------------------------------------------------------
filtering:
  # Step 08:
  # Drop genes where max count across all samples < threshold.
  # "auto" sets threshold to number of samples.
  # Increase threshold for stricter filtering; decrease to keep low-expression genes.
  min_max_count: "auto"   # "auto" or integer (for example 5, 10)

# -- DESeq2 parameters --------------------------------------------------------
deseq2:
  # Step 09:
  # Keep method=pydeseq2 for exam environment (no R required).
  # fdr_threshold controls significance stringency.
  # lfc_threshold can enforce biological effect-size filtering.
  fdr_threshold: 0.05
  lfc_threshold: 0.0      # log2 fold-change threshold (0 = no effect-size filter)
  # Backend for differential expression:
  #   "pydeseq2" (recommended)
  #   "wrapper"  (course-server-specific wrapper)
  method: "pydeseq2"
  # Reference level for the condition factor (denominator in all contrasts)
  reference_level: "wt"

# -- Contrasts / comparisons --------------------------------------------------
# Step 09:
# Each contrast is numerator vs denominator (log2FC = numerator/denominator).
# Update names/levels to match condition_map outputs above.
comparisons:
  - name: "tet1_vs_wt"
    numerator: "tet1"
    denominator: "wt"
  - name: "tet2_vs_wt"
    numerator: "tet2"
    denominator: "wt"

# -- BigWig parameters --------------------------------------------------------
bigwig:
  # Step 06:
  # mapq_filter=255 keeps uniquely mapped STAR reads only.
  # Lower (for example 10/20) to include more reads.
  normalization: "CPM"
  mapq_filter: 255       # STAR unique mappers MAPQ=255
  bin_size: 50
  use_deseq2_sizefactors: true  # also produce DESeq2-scaled BigWigs if available
