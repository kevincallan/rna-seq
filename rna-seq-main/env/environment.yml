name: rnaseq_pipeline
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pyyaml
  - pandas
  - numpy
  - scipy
  - matplotlib
  - scikit-learn
  # Pure-Python bioinformatics
  - pydeseq2>=0.4           # replaces R DESeq2
  - pysam>=0.21             # replaces samtools
  - htseq>=2.0              # replaces featureCounts
  # Bioinformatics tools (compiled binaries -- only STAR is strictly required)
  - star
  - samtools
  - subread          # featureCounts
  - fastqc
  - multiqc
  - cutadapt
  - fastp
  - trimmomatic
  - deeptools        # bamCoverage
  # R + DESeq2
  - r-base>=4.2
  - bioconductor-deseq2
  - r-ggplot2
  - r-pheatmap
  # Testing
  - pytest
  # Optional
  - pip:
    - markdown
